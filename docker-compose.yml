services:
  llm-dev-assistant:
    build: .
    ports:
      - "8083:8083"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
